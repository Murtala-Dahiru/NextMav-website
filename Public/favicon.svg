<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gear/Cog Main Shape -->
  <g stroke="#1e40af" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central circle -->
    <circle cx="100" cy="100" r="45"/>
    
    <!-- Inner circles (nodes) -->
    <circle cx="100" cy="100" r="8" fill="#1e40af"/>
    <circle cx="100" cy="75" r="5" fill="none"/>
    <circle cx="125" cy="100" r="5" fill="none"/>
    <circle cx="100" cy="125" r="5" fill="none"/>
    <circle cx="75" cy="100" r="5" fill="none"/>
    
    <!-- Connection lines -->
    <line x1="100" y1="45" x2="100" y2="70"/>
    <line x1="155" y1="100" x2="130" y2="100"/>
    <line x1="100" y1="155" x2="100" y2="130"/>
    <line x1="45" y1="100" x2="70" y2="100"/>
    
    <!-- Top extension -->
    <line x1="100" y1="35" x2="100" y2="20"/>
    <circle cx="100" cy="15" r="4" fill="none"/>
    
    <!-- Right extension -->
    <line x1="165" y1="100" x2="180" y2="100"/>
    <circle cx="185" cy="100" r="4" fill="none"/>
    
    <!-- Bottom extension -->
    <line x1="100" y1="165" x2="100" y2="180"/>
    <circle cx="100" cy="185" r="4" fill="none"/>
    
    <!-- Left extension -->
    <line x1="35" y1="100" x2="20" y2="100"/>
    <circle cx="15" cy="100" r="4" fill="none"/>
    
    <!-- Gear teeth effect with outer gear ring -->
    <circle cx="100" cy="100" r="55" fill="none"/>
    
    <!-- Top-left gear tooth -->
    <path d="M 78 58 L 72 52"/>
    
    <!-- Top-right gear tooth -->
    <path d="M 122 58 L 128 52"/>
    
    <!-- Bottom-right gear tooth -->
    <path d="M 122 142 L 128 148"/>
    
    <!-- Bottom-left gear tooth -->
    <path d="M 78 142 L 72 148"/>
    
    <!-- Diagonal extensions for network effect -->
    <line x1="142" y1="58" x2="158" y2="42"/>
    <circle cx="163" cy="37" r="4" fill="none"/>
    
    <line x1="142" y1="142" x2="158" y2="158"/>
    <circle cx="163" cy="163" r="4" fill="none"/>
    
    <line x1="58" y1="142" x2="42" y2="158"/>
    <circle cx="37" cy="163" r="4" fill="none"/>
    
    <line x1="58" y1="58" x2="42" y2="42"/>
    <circle cx="37" cy="37" r="4" fill="none"/>
  </g>
</svg>