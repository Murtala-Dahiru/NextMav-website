<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78716C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" fill="url(#grad)" rx="48"/>
  <!-- Code brackets icon -->
  <g transform="translate(128, 128)">
    <!-- Left bracket -->
    <path d="M -50 -40 L -70 -20 L -50 0 L -70 20 L -50 40" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket -->
    <path d="M 50 -40 L 70 -20 L 50 0 L 70 20 L 50 40" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="white"/>
  </g>
</svg>
